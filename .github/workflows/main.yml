name: Build, Test, Push Docker Image and Deploy on Render

on:
  push:
    branches:
      - master
  # Allows manual execution from the GitHub Actions UI
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm" # Caches npm packages to speed up subsequent runs

      - name: Install Dependencies
        run: npm ci # Uses 'ci' instead of 'install' to use package-lock.json

      - name: Compile TypeScript
        run: npm run build

      - name: Upload Build Artifact
        # Passes the compiled output to the next job since runners are isolated
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        # Ephemeral database used exclusively for this test run
        image: postgres:17
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db

        ports:
          - 5432:5432
        # Health checks ensure the DB is fully accepting connections before tests start
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      JWT_SECRET: "test_secret"
      DB_PORT: 5432
      DB_HOST: "localhost"
      DB_USER: "test_user"
      DB_PASSWORD: "test_password"
      DB_NAME: "test_db"
      DEFAULT_ADMIN_EMAIL: "admin@domain.com"
      DEFAULT_ADMIN_USER: "admin"
      DEFAULT_ADMIN_NAME: "Admin Teste"
      DEFAULT_ADMIN_PASSWORD: "123456"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist/

      - name: Run Migrations
        run: npm run migration:run

      - name: Run Unit Tests
        run: npm run test

  # The following steps are restricted to the 'master' branch and if tests pass
  deploy:
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tc-blogging-backend:latest

      - name: Run Deploy Hook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }} # Triggers the Render platform to pull the newly pushed image and deploy
